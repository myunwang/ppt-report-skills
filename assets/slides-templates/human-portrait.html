<!--
  TEMPLATE · human-portrait (人体画像 / 拟人化能力图 / 部位热力图)
  用途:把"对象画像 / 能力拟人 / 风险热图 / 团队 pictogram" 等
        需要「中央人体形象 + 周边标签 + 部位高亮」的页型
  典型场景:
    1. 用户画像(头=职业 心=动机 手=场景 腿=地域)
    2. 能力地图(头=推理 眼=视觉 耳=语音 手=工具 腿=Agent)
    3. 职业风险热图(颜色深浅 = 被 AI 取代风险)
    4. 团队 pictogram(N 个小人代表 N×100 人)

  ── 关键设计铁律(必看!) ──
  1. 人体 SVG 永远直接抄 OpenMoji,不要自己手画 → 见 [`references/svg-aesthetics.md`]
     curl https://raw.githubusercontent.com/hfg-gmuend/openmoji/master/black/svg/1F9CD.svg
     原 viewBox 是 72×72(标准人物)。

  2. **viewBox 必须用 OpenMoji 原坐标系**(72×72),不要把人体 transform scale 后再画高亮 ——
     高亮坐标会和身体对不齐。
     正确做法:整个 SVG viewBox="0 0 72 N"(N = 72-100),所有内容(高亮圆 / 人体 / 图例)都用原始小坐标。
     人体部位关键点(OpenMoji 1F9CD 原坐标):
       头中心 (35.4, 10.65) · 头半径 ≈ 3
       眼睛 (33, 10) (37.8, 10) · 半径 ~1.6
       耳朵 (31, 11) (39.8, 11) · 半径 ~1.4
       胸/心 (35.4, 25) · 半径 ~5
       手   (26.5, 38) (44.3, 38) · 半径 ~3.5
       脚   (33.4, 62) (37.4, 62) · 半径 ~3.5

  3. **部位高亮用透明圆形,放在人体 path 后面**(z 序在底)
     fill-opacity: 0.15-0.35;颜色用主题色 hue(蓝/绿/橙/紫/红/粉)
     不要用 clip-path — 偶尔渲染怪;透明圆叠加最稳。

  4. **CSS 容器用 grid:1fr SVG固定宽 1fr** 让 SVG 居中,左右标签各占 1 列
     标签卡片用 justify-self: end/start 让它们贴近 SVG 边缘
     SVG 用 preserveAspectRatio="xMidYMid meet" 保持比例不变形

  5. **若标签 ≥ 5 个**,用 grid-template-rows: 1fr 1fr 1fr 让左右各放 2-3 个标签错落分布
     标签 ≤ 4 个时左右各 2 个,上下排列即可。
-->
<div class="slide" id="sX">
  <div class="slide-label">{副标题英文} · {大类名}</div>
  <div class="slide-title">{标题} — <span>{核心观点}</span></div>
  <div class="slide-subtitle">
    {一句简介 · 标签数 · 数据来源}
  </div>

  <div class="hp-board">
    <div class="hp-figure">
      <!-- 5 个标签卡片 -->
      <div class="hp-tag hp-tag-tl">
        <div class="hp-tag-num">01</div>
        <div class="hp-tag-h">{标签 1 标题}</div>
        <div class="hp-tag-num-big">{核心数字}</div>
        <div class="hp-tag-meta">{解释}</div>
      </div>
      <div class="hp-tag hp-tag-ml">
        <div class="hp-tag-num">02</div>
        <div class="hp-tag-h">{标签 2 标题}</div>
        <div class="hp-tag-num-big">{核心数字}</div>
        <div class="hp-tag-meta">{解释}</div>
      </div>
      <div class="hp-tag hp-tag-bl">
        <div class="hp-tag-num">03</div>
        <div class="hp-tag-h">{标签 3 标题}</div>
        <div class="hp-tag-num-big">{核心数字}</div>
        <div class="hp-tag-meta">{解释}</div>
      </div>
      <div class="hp-tag hp-tag-tr">
        <div class="hp-tag-num">04</div>
        <div class="hp-tag-h">{标签 4 标题}</div>
        <div class="hp-tag-num-big">{核心数字}</div>
        <div class="hp-tag-meta">{解释}</div>
      </div>
      <div class="hp-tag hp-tag-br">
        <div class="hp-tag-num">05</div>
        <div class="hp-tag-h">{标签 5 标题}</div>
        <div class="hp-tag-num-big">{核心数字}</div>
        <div class="hp-tag-meta">{解释}</div>
      </div>

      <!-- ═══ 中央人体 SVG (剪影 v3 · 男西装提包 or 女长发耸肩) ═══
           剪影来源:OpenClipart CC0 — 321053 / 310702
           data-kind="man" → viewBox 708.66×1066.11(竖向全身)
           data-kind="woman" → viewBox 2334.69×1638.97(横向半身)
           viewBox 由 injectSilhouette() 自动设置,坐标按 kind 各自的系
           common.js 须含 window.SILHOUETTE_DATA + window.injectSilhouette(svg, kind) -->
      <!-- ① Overlay 引线层 — 关键!引线必须真正连接「标签卡边缘 ↔ 剪影部位」
           做法:在 .hp-figure 外层(必须 position:relative)加 absolute inset:0 SVG,
                 用 viewBox="0 0 1000 1000" + preserveAspectRatio="none" 拉伸贴合容器,
                 用 vector-effect="non-scaling-stroke" 保持虚线宽度独立于拉伸
           坐标取百分比(0-1000):
             x ≈ 280 是左卡片右边缘附近(标签 max-width 280px 撑满 1fr 列)
             x ≈ 720 是右卡片左边缘附近
             x ≈ 490-510 是中央剪影中线(刚好抵达剪影身体)
             y 取每个标签的垂直中心(标签在 grid 3 行的 1/6 / 1/2 / 5/6) -->
      <svg class="hp-leaders" viewBox="0 0 1000 1000" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <g fill="none" stroke-linecap="round">
          <!-- 01 头(蓝) — 左上卡 → 头部 -->
          <line x1="280" y1="180" x2="490" y2="180" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6,5" opacity="0.75" vector-effect="non-scaling-stroke"/>
          <!-- 02 心(绿) — 左中卡 → 胸 -->
          <line x1="280" y1="500" x2="490" y2="500" stroke="#10b981" stroke-width="2" stroke-dasharray="6,5" opacity="0.75" vector-effect="non-scaling-stroke"/>
          <!-- 03 腿(紫) — 左下卡 → 腿 -->
          <line x1="280" y1="820" x2="490" y2="820" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,5" opacity="0.75" vector-effect="non-scaling-stroke"/>
          <!-- 04 肩(橙) — 右上卡 → 肩 -->
          <line x1="720" y1="320" x2="510" y2="320" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,5" opacity="0.75" vector-effect="non-scaling-stroke"/>
          <!-- 05 提包(粉) — 右下卡 → 手/包 -->
          <line x1="720" y1="650" x2="510" y2="650" stroke="#ec4899" stroke-width="2" stroke-dasharray="6,5" opacity="0.75" vector-effect="non-scaling-stroke"/>
        </g>
      </svg>

      <!-- ② 中央剪影 SVG(只放剪影,不再放引线;引线已在 ① 跨容器 overlay) -->
      <svg class="hp-svg silhouette-host" data-kind="man" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
        <!-- 剪影由 JS 注入:initSlideN() 调用 injectSilhouette(svg, data-kind) -->
      </svg>
    </div>

    <!-- 底部一句话总结 -->
    <div class="hp-foot">
      <span class="hp-foot-tag">画像总结</span>
      <span class="hp-foot-text">
        {一句话 · 让读者带走的核心判断 · 含 <strong>关键数字加粗</strong>}
      </span>
    </div>
  </div>
</div>

<style>
/* human-portrait 模板样式 — 复制到 src/styles/slide-N.css,把所有 #sX 改成 #sN */

#sX .hp-board {
  flex: 1 1 auto;
  display: flex;
  flex-direction: column;
  min-height: 0;
  margin-top: 8px;
}

/* ── 3 列 × 3 行布局:中央 SVG 固定宽,左右 1fr 各放标签 ── */
#sX .hp-figure {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 340px 1fr;
  grid-template-rows: 1fr 1fr 1fr;

}

/* Overlay 引线层(absolute 覆盖整个 figure,viewBox 拉伸贴合容器) */
